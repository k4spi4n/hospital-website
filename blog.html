<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMEC Insight | Bản tin y tế</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="blog-page">
    <header class="blog-topbar">
      <div class="container blog-topbar-inner">
        <a class="logo" href="./index.html#top" aria-label="CMEC Hospital">
          <span class="logo-mark" aria-hidden="true">+</span>
          <span>CMEC Insight</span>
        </a>
        <a class="btn btn-outline" href="./index.html#news">Quay lại Tin tức</a>
      </div>
    </header>

    <main>
      <section class="blog-hero">
        <div class="container">
          <p class="blog-hero-kicker">Tin tức & Sự kiện y tế</p>
          <h1 id="blogTitle">Bài viết y tế</h1>
          <p id="blogExcerpt" class="blog-hero-excerpt"></p>
          <div class="blog-meta-row">
            <span id="blogDate"></span>
            <span id="blogCategory" class="blog-chip"></span>
          </div>
        </div>
      </section>

      <section class="section blog-section">
        <div class="container blog-grid">
          <article class="blog-article" aria-live="polite">
            <img id="blogCover" class="blog-cover" alt="" loading="lazy" />
            <div id="blogContent" class="blog-content"></div>
          </article>

          <aside class="blog-sidebar" aria-label="Bài viết liên quan">
            <div class="blog-widget">
              <h2>Bài viết liên quan</h2>
              <ul id="relatedPosts" class="related-list"></ul>
            </div>

            <div class="blog-widget blog-cta">
              <h2>Cần tư vấn trực tiếp?</h2>
              <p>
                Đặt lịch nhanh với chuyên gia CMEC để được tư vấn kế hoạch chăm
                sóc sức khỏe phù hợp cho bạn và gia đình.
              </p>
              <a class="btn btn-primary" href="./index.html#booking"
                >Đặt lịch khám</a
              >
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./scripts/blog.js" defer></script>
  </body>
</html>
